name: Release

# Builds installable artifacts for every platform and publishes a GitHub
# Release. Triggers only when a version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Configure release signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > android/app/papernotes-release.jks
          cat > android/key.properties <<EOF
          storeFile=papernotes-release.jks
          storePassword=$STORE_PASS
          keyPassword=$KEY_PASS
          keyAlias=$KEY_ALIAS
          EOF
      - name: Build APK
        run: flutter build apk --release
      - name: Rename artifact
        run: |
          VER="${GITHUB_REF_NAME#v}"
          cp build/app/outputs/flutter-apk/app-release.apk "papernotes-${VER}-android.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: papernotes-*-android.apk

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - name: Build macOS
        run: flutter build macos --release
      - name: Package .app
        run: |
          VER="${GITHUB_REF_NAME#v}"
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent papernotes.app \
            "$GITHUB_WORKSPACE/papernotes-${VER}-macos.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: papernotes-*-macos.zip

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release
      - name: Package
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath "papernotes-$ver-windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: papernotes-*-windows.zip

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libnotify-dev libayatana-appindicator3-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter config --enable-linux-desktop
      # The linux/ runner folder isn't committed (it can't be scaffolded on
      # macOS, the dev machine), so generate it here before building.
      - run: flutter create --platforms=linux .
      - run: flutter pub get
      - name: Build Linux
        run: flutter build linux --release
      - name: Package
        run: |
          VER="${GITHUB_REF_NAME#v}"
          tar -czf "papernotes-${VER}-linux.tar.gz" \
            -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: papernotes-*-linux.tar.gz

  release:
    name: Publish release
    needs: [build-android, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/**/*
